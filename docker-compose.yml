services:
  db:
    image: postgres:17
    container_name: mandje-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mandje
    ports:
      - "5432:5432"
    volumes:
      - mandje-pgdata:/var/lib/postgresql/data

volumes:
  mandje-pgdata:
